<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAR — Thank You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #F6F4F0;
      --text: #1A1A1A;
      --text-muted: #8A8580;
      --text-dim: #B0ABA5;
      --border: #D6D2CB;
      --label: #2F2A26;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-ar: 'Noto Kufi Arabic', sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      font-weight: 300;
    }

    body[dir="rtl"] { font-family: var(--font-ar); }
    body[dir="rtl"] .lang-en { display: none; }
    body:not([dir="rtl"]) .lang-ar { display: none; }
    body[dir="rtl"], body[dir="rtl"] * { letter-spacing: normal !important; }

    .logo {
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--label);
      margin-bottom: 40px;
    }

    .container {
      max-width: 460px;
    }

    .thank-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border: 1px solid var(--border);
      border-radius: 50%;
      margin-bottom: 32px;
      font-size: 1.4rem;
    }

    h1 {
      font-size: clamp(1.4rem, 3vw, 1.8rem);
      font-weight: 400;
      letter-spacing: -0.5px;
      color: var(--label);
      margin-bottom: 16px;
    }

    p {
      font-size: 0.88rem;
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 32px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 0 auto 32px;
    }

    .small {
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    a {
      display: inline-block;
      margin-top: 32px;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--label);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 10px 28px;
      transition: all 0.25s;
    }
    a:hover {
      background: var(--label);
      color: var(--bg);
      border-color: var(--label);
    }
  </style>
</head>
<body>

  <div class="logo">DAR</div>

  <div class="container">
    <div class="thank-icon">☕</div>

    <h1 class="lang-en">Thank You.</h1>
    <h1 class="lang-ar">شكراً لك.</h1>

    <p class="lang-en">You are now one of the first members shaping DAR.<br>This is just the beginning.</p>
    <p class="lang-ar">أنت الآن من أوائل من يشكلون دار.<br>هذه مجرد البداية.</p>

    <div class="divider"></div>

    <p class="small lang-en">We'll reach out when the time comes.</p>
    <p class="small lang-ar">سنكون على تواصل عندما يحين الوقت.</p>

    <a href="/" class="lang-en">Back to DAR</a>
    <a href="/" class="lang-ar">العودة لدار</a>
  </div>

  <script>
    const saved = localStorage.getItem('dar-lang');
    if (saved === 'ar') document.body.setAttribute('dir', 'rtl');
  </script>

</body>
</html>
